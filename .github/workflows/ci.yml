name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install SQLite with extension support (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Playwright Chromium
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            bunx playwright install chromium --with-deps
          else
            bunx playwright install chromium
          fi

      - name: Run tests (Bun)
        run: >-
          bun test --recursive
          packages/core packages/config packages/gateway packages/memory
          packages/providers packages/scheduler packages/skills packages/stt
          packages/channels packages/tools/marker packages/tools/web-fetch
          packages/tools/web-search packages/tools/browser/src/__tests__/snapshot.test.ts
          packages/ui apps

      - name: Run browser tests (Node + Vitest)
        working-directory: packages/tools/browser
        run: npx vitest run

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Run Docker smoke test
        run: |
          chmod +x scripts/smoke-docker.sh
          scripts/smoke-docker.sh
